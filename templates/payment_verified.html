<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Verified - NUST Sports Complex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .verified-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 50px 40px;
            text-align: center;
        }
        
        .verified-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 50px;
            animation: scaleIn 0.5s ease-out;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .verified-header h1 {
            color: #1a1a1a;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .verified-header p {
            color: #7f8c8d;
            font-size: 14px;
        }
        
        .payment-details {
            background: #f8f9fa;
            border-left: 5px solid #27ae60;
            padding: 20px;
            border-radius: 8px;
            margin: 30px 0;
            text-align: left;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .detail-row:last-child {
            margin-bottom: 0;
        }
        
        .detail-label {
            color: #7f8c8d;
            font-weight: 600;
        }
        
        .detail-value {
            color: #1a1a1a;
            font-weight: 600;
            text-align: right;
        }
        
        .transaction-info {
            background: #d5f4e6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            color: #229954;
            font-size: 14px;
        }
        
        .transaction-info strong {
            display: block;
            margin-bottom: 5px;
        }
        
        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(231, 76, 60, 0.3);
        }
    </style>
</head>
<body>
    <div class="verified-container">
        <div class="verified-icon">✓</div>
        
        <div class="verified-header">
            <h1>Payment Verified</h1>
            <p>NUST Sports Complex</p>
        </div>
        
        <div class="transaction-info">
            <strong>Transaction ID: {{ transaction_id }}</strong>
            Your payment has been successfully processed.
        </div>
        
        <div class="payment-details">
            <div class="detail-row">
                <span class="detail-label">Payment Type:</span>
                <span class="detail-value">{{ payment_type }}</span>
            </div>
            
            <div class="detail-row">
                <span class="detail-label">Amount Paid:</span>
                <span class="detail-value">₹ {{ amount }}</span>
            </div>
        </div>
        
        <a href="/user" class="btn">Go Back to Dashboard</a>
    </div>
</body>
</html>
